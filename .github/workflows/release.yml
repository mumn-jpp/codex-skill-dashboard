name: Native Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  id-token: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 26, registry-url: 'https://registry.npmjs.org' }
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build:sea
      - run: choco install imagemagick innosetup --yes --no-progress
      - shell: powershell
        run: ./packaging/windows/build-icon.ps1
      - shell: powershell
        run: iscc packaging/windows/installer.iss
      - shell: powershell
        run: Get-FileHash dist/codex-skill-dashboard.exe -Algorithm SHA256 | Out-File dist/windows-sha256.txt
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: 'dist/*' }

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 26 }
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build:sea
      - run: |
          curl -L -o dist/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x dist/appimagetool packaging/linux/*.sh
          APPIMAGETOOL="$PWD/dist/appimagetool" packaging/linux/build-appimage.sh
          packaging/linux/build-deb.sh
          sha256sum dist/*.AppImage dist/*.deb > dist/linux-sha256.txt
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: 'dist/*' }

  macos:
    strategy:
      matrix: { os: [macos-13, macos-14] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 26 }
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm run build:sea
      - run: brew install imagemagick
      - run: chmod +x packaging/macos/*.sh && packaging/macos/build-icon.sh && packaging/macos/build-dmg.sh
      - run: shasum -a 256 dist/*.dmg > dist/macos-sha256.txt
      - uses: actions/upload-artifact@v4
        with: { name: 'macos-${{ matrix.os }}', path: 'dist/*' }

  publish:
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 26, registry-url: 'https://registry.npmjs.org' }
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/download-artifact@v4
        with: { path: release-artifacts, merge-multiple: true }
      - run: pnpm install --frozen-lockfile && pnpm test
      - run: npm publish --provenance --access public
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
