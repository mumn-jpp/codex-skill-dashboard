name: Bug report
description: Report a reproducible problem
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: What happened and what did you expect? }
    validations: { required: true }
  - type: input
    id: environment
    attributes: { label: Environment, description: OS, Node.js version, and dashboard version }
    validations: { required: true }
