<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Codex Skill Dashboard</title><link rel="stylesheet" href="/styles.css"></head><body><header><div><h1>Codex Skill Dashboard</h1><p>发现、理解并管理本机 Skills</p></div><button id="scan">重新扫描</button></header><main><section class="filters" aria-label="筛选"><input id="search" placeholder="搜索名称、作用或备注"><select id="source"><option value="">全部来源</option></select><label><input id="favorite" type="checkbox"> 仅看常用</label></section><p id="status" role="status" aria-live="polite"></p><section id="list" class="list"></section></main><dialog id="edit"><form method="dialog"><h2>标注 Skill</h2><input type="hidden" id="edit-id"><label>中文作用<textarea id="purposeZh" maxlength="500"></textarea></label><label>分类<input id="category" maxlength="50"></label><label>使用场景<textarea id="scenarios" maxlength="1000"></textarea></label><label>触发语（每行一条）<textarea id="triggers"></textarea></label><label><input id="fav-edit" type="checkbox"> 常用</label><label>备注<textarea id="notes" maxlength="2000"></textarea></label><menu><button value="cancel">取消</button><button id="save" value="default">保存</button></menu></form></dialog><dialog id="confirm"><form method="dialog"><h2>移至系统回收站？</h2><p id="confirm-text"></p><menu><button value="cancel">取消</button><button id="trash-confirm" value="default" class="danger">确认移至回收站</button></menu></form></dialog><script src="/icons.js"></script><script src="/app.js"></script></body></html>
